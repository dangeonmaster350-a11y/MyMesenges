<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📱 Мобильный Мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 10px;
        }
        
        .chat-container {
            width: 100%;
            max-width: 400px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .chat-header h2 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }
        
        .chat-header p {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f7fb;
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }
        
        .message.own {
            align-items: flex-end;
        }
        
        .message-content {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 20px;
            position: relative;
            word-wrap: break-word;
        }
        
        .message:not(.own) .message-content {
            background: white;
            border-bottom-left-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .message.own .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }
        
        .message-info {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
            font-size: 0.8rem;
        }
        
        .message:not(.own) .message-info {
            color: #666;
        }
        
        .message.own .message-info {
            color: #999;
        }
        
        .username {
            font-weight: bold;
            margin-right: 10px;
        }
        
        .timestamp {
            font-size: 0.7rem;
        }
        
        .typing-indicator {
            padding: 10px 20px;
            color: #999;
            font-style: italic;
            font-size: 0.9rem;
        }
        
        .input-area {
            background: white;
            padding: 15px;
            border-top: 1px solid #eee;
        }
        
        .username-input {
            margin-bottom: 10px;
        }
        
        .username-input input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
        }
        
        .message-input {
            display: flex;
            gap: 10px;
        }
        
        .message-input input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
        }
        
        .message-input input:focus {
            border-color: #667eea;
        }
        
        .message-input button {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            outline: none;
        }
        
        .message-input button:active {
            transform: scale(0.95);
        }
        
        .connection-status {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        
        .connected {
            background: #4CAF50;
        }
        
        .disconnected {
            background: #f44336;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>📱 Mobile Chat</h2>
            <p>Подключено пользователей: <span id="user-count">1</span></p>
        </div>
        
        <div class="messages" id="messages"></div>
        
        <div class="typing-indicator" id="typingIndicator"></div>
        
        <div class="input-area">
            <div class="username-input">
                <input type="text" id="username" placeholder="Ваше имя" value="User" maxlength="20">
            </div>
            <div class="message-input">
                <input type="text" id="message" placeholder="Введите сообщение..." maxlength="200">
                <button id="sendBtn">➤</button>
            </div>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script>
        const socket = io(window.location.origin);
        const messagesContainer = document.getElementById('messages');
        const messageInput = document.getElementById('message');
        const usernameInput = document.getElementById('username');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');
        
        let typingTimer;
        let isTyping = false;
        
        // Загрузка истории сообщений
        fetch('/get_messages')
            .then(response => response.json())
            .then(messages => {
                messages.reverse().forEach(msg => {
                    addMessage(msg[0], msg[1], msg[2], msg[0] === usernameInput.value);
                });
            });
        
        // Отправка сообщения
        function sendMessage() {
            const message = messageInput.value.trim();
            const username = usernameInput.value.trim() || 'Anonymous';
            
            if (message) {
                socket.emit('send_message', {
                    username: username,
                    message: message
                });
                messageInput.value = '';
            }
        }
        
        sendBtn.addEventListener('click', sendMessage);
        
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
            
            // Индикатор печатания
            if (!isTyping) {
                isTyping = true;
                socket.emit('user_typing', {
                    username: usernameInput.value || 'Anonymous',
                    isTyping: true
                });
            }
            
            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => {
                isTyping = false;
                socket.emit('user_typing', {
                    username: usernameInput.value || 'Anonymous',
                    isTyping: false
                });
            }, 1000);
        });
        
        // Получение нового сообщения
        socket.on('new_message', (data) => {
            addMessage(data.username, data.message, data.timestamp, data.username === usernameInput.value);
        });
        
        // Индикатор печатания
        socket.on('user_typing', (data) => {
            if (data.isTyping && data.username !== usernameInput.value) {
                typingIndicator.textContent = `${data.username} печатает...`;
            } else {
                typingIndicator.textContent = '';
            }
        });
        
        // Подсчет пользователей
        socket.on('connect', () => {
            console.log('Connected to server');
        });
        
        function addMessage(username, message, timestamp, isOwn) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isOwn ? 'own' : ''}`;
            
            messageDiv.innerHTML = `
                <div class="message-info">
                    <span class="username">${username}</span>
                    <span class="timestamp">${timestamp}</span>
                </div>
                <div class="message-content">${message}</div>
            `;
            
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
    </script>
</body>
</html>
